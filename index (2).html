
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물질을 이루는 기본 성분 학습하기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }
        #section1 {
            display: block;
        }
        h2 {
            font-size: 1.2em;
            color: #2980b9;
        }
        .question-row {
            display: none;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-label {
            width: 150px;
            font-weight: bold;
        }
        /* 화학식 스타일 수정 */
        .chemical-formula {
            font-family: Arial, sans-serif; /* 맑은 고딕 대신 영문에 적합한 폰트 사용 */
            font-size: 1.3em;
            font-weight: bold;
            letter-spacing: 0px; 
            margin-right: 10px;
        }
        /* 아래첨자 스타일 조정 */
        sub {
            font-size: 0.6em;
            vertical-align: sub;
        }
        input[type="text"] {
            padding: 8px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 150px;
        }
        .feedback {
            margin-left: 15px;
            font-weight: bold;
        }
        .correct { color: #27ae60; }
        .incorrect { color: #e74c3c; }
        input.correct-input { border-color: #27ae60; background-color: #eafaf1; pointer-events: none; }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-left: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .notice {
            font-size: 0.9em;
            color: #e67e22;
            margin-bottom: 15px;
        }
        .model-img img {
            max-width: 200px;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .model-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
        }
        .model-input-area {
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>

    <h1>🧪 물질을 이루는 기본 성분 학습하기</h1>

    <div class="section" id="section1">
        <h2>1. 다음 물질을 화학식으로 나타내시오.</h2>
        <p class="notice">※ 알파벳 대소문자를 구분하고, 숫자는 이어서 입력하세요. 정답을 맞혀야 다음 문제가 나옵니다.</p>

        <div class="questions-container" id="q-container-1">
            <div class="question-row" style="display: flex;">
                <div class="question-label">수소</div>
                <input type="text" data-answer="H2" placeholder="화학식 입력" onkeypress="handleEnter(event, this)">
                <button onclick="checkSingleAnswer(this)">확인</button>
                <span class="feedback"></span>
            </div>
            <div class="question-row"><div class="question-label">산소</div><input type="text" data-answer="O2" placeholder="화학식 입력" onkeypress="handleEnter(event, this)"><button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span></div>
            <div class="question-row"><div class="question-label">질소</div><input type="text" data-answer="N2" placeholder="화학식 입력" onkeypress="handleEnter(event, this)"><button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span></div>
            <div class="question-row"><div class="question-label">염화 수소</div><input type="text" data-answer="HCl" placeholder="화학식 입력" onkeypress="handleEnter(event, this)"><button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span></div>
            <div class="question-row"><div class="question-label">암모니아</div><input type="text" data-answer="NH3" placeholder="화학식 입력" onkeypress="handleEnter(event, this)"><button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span></div>
            <div class="question-row"><div class="question-label">메테인</div><input type="text" data-answer="CH4" placeholder="화학식 입력" onkeypress="handleEnter(event, this)"><button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span></div>
        </div>
    </div>

    <div class="section" id="section2">
        <h2>2. 다음 화학식의 이름을 쓰시오.</h2>
        <p class="notice">※ 띄어쓰기 없이 정확한 한글 이름을 입력하세요. 정답을 맞혀야 다음 문제가 나옵니다.</p>

        <div class="questions-container" id="q-container-2">
            <!-- 띄어쓰기 문제 완벽 해결: 특수문자 대신 HTML sub 태그 사용 -->
            <div class="question-row" style="display: flex;">
                <div class="question-label chemical-formula">O<sub>2</sub></div>
                <input type="text" data-answer="산소" placeholder="물질 이름 입력" onkeypress="handleEnter(event, this)">
                <button onclick="checkSingleAnswer(this)">확인</button>
                <span class="feedback"></span>
            </div>
            <div class="question-row">
                <div class="question-label chemical-formula">O<sub>3</sub></div>
                <input type="text" data-answer="오존" placeholder="물질 이름 입력" onkeypress="handleEnter(event, this)">
                <button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span>
            </div>
            <div class="question-row">
                <div class="question-label chemical-formula">CO</div>
                <input type="text" data-answer="일산화탄소,일산화 탄소" placeholder="물질 이름 입력" onkeypress="handleEnter(event, this)">
                <button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span>
            </div>
            <div class="question-row">
                <div class="question-label chemical-formula">CO<sub>2</sub></div>
                <input type="text" data-answer="이산화탄소,이산화 탄소" placeholder="물질 이름 입력" onkeypress="handleEnter(event, this)">
                <button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span>
            </div>
            <div class="question-row">
                <div class="question-label chemical-formula">H<sub>2</sub>O</div>
                <input type="text" data-answer="물" placeholder="물질 이름 입력" onkeypress="handleEnter(event, this)">
                <button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span>
            </div>
            <div class="question-row">
                <div class="question-label chemical-formula">H<sub>2</sub>O<sub>2</sub></div>
                <input type="text" data-answer="과산화수소,과산화 수소" placeholder="물질 이름 입력" onkeypress="handleEnter(event, this)">
                <button onclick="checkSingleAnswer(this)">확인</button><span class="feedback"></span>
            </div>
        </div>
    </div>

    <div class="section" id="section3">
        <h2>3. 입자 모형과 수를 화학식으로 나타내시오.</h2>

                <div class="model-input-area">
                    <div>
                        <input type="text" data-answer="4CH4" placeholder="화학식 입력" onkeypress="handleEnter(event, this)">
                        <button onclick="checkSingleAnswer(this)">확인</button>
                        <span class="feedback"></span>
                    </div>

    <script>
        // 엔터키 입력 처리
        function handleEnter(event, inputElement) {
            if (event.key === 'Enter') {
                checkSingleAnswer(inputElement.nextElementSibling);
            }
        }

        // 개별 문제 채점 로직
        function checkSingleAnswer(btnElement) {
            const row = btnElement.closest('.question-row');
            const input = row.querySelector('input[type="text"]');
            const feedbackSpan = row.querySelector('.feedback');

            let userValue = input.value.trim().replace(/\s+/g, '');
            const answers = input.dataset.answer.split(',');
            let isCorrect = false;

            if (userValue === '') {
                feedbackSpan.textContent = '답을 입력해주세요.';
                feedbackSpan.className = 'feedback incorrect';
                return;
            }

            for(let ans of answers) {
                if (ans.match(/[a-zA-Z]/)) {
                     if (userValue === ans) { isCorrect = true; break; }
                } else {
                     if (userValue === ans.replace(/\s+/g, '')) { isCorrect = true; break; }
                }
            }

            if (isCorrect) {
                input.className = 'correct-input';
                feedbackSpan.textContent = '⭕ 정답!';
                feedbackSpan.className = 'feedback correct';
                btnElement.style.display = 'none';

                showNextQuestion(row);
            } else {
                input.value = '';
                input.focus();
                feedbackSpan.textContent = '❌ 다시 시도해보세요.';
                feedbackSpan.className = 'feedback incorrect';

                setTimeout(() => {
                    feedbackSpan.textContent = '';
                }, 1500);
            }
        }

        // 다음 문제 보여주는 로직
        function showNextQuestion(currentRow) {
            const nextRow = currentRow.nextElementSibling;

            if (nextRow && nextRow.classList.contains('question-row')) {
                nextRow.style.display = 'flex';
                nextRow.querySelector('input').focus();
            } else {
                const currentSection = currentRow.closest('.section');
                const nextSection = currentSection.nextElementSibling;

                if (nextSection && nextSection.classList.contains('section')) {
                    nextSection.style.display = 'block';
                    const firstInput = nextSection.querySelector('input[type="text"]');
                    if(firstInput) firstInput.focus();

                    nextSection.scrollIntoView({ behavior: 'smooth' });
                } else {
                    setTimeout(() => alert('🎉 축하합니다! 모든 학습을 성공적으로 완료했습니다!'), 300);
                }
            }
        }
    </script>
</body>
</html>
